<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STACK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    background: #1b2030;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; user-select: none;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; max-width: 480px; }
  canvas { display: block; width: 100%; height: 100%; background: linear-gradient(#222a40, #11141f); }

  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    text-align: center; color: #fff; pointer-events: none;
    padding-top: 28px;
  }
  #score { font-size: 64px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 4px 16px rgba(0,0,0,.4); }
  #best { font-size: 15px; opacity: .65; margin-top: 4px; letter-spacing: 1px; }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center; background: rgba(15,18,28,.55);
    backdrop-filter: blur(2px);
  }
  #overlay.hide { display: none; }
  #title { font-size: 56px; font-weight: 800; letter-spacing: 8px; margin-bottom: 6px; }
  #sub { font-size: 16px; opacity: .8; line-height: 1.7; margin-bottom: 28px; }
  #final { font-size: 20px; opacity: .9; margin-bottom: 18px; min-height: 26px; }
  .btn {
    pointer-events: auto; cursor: pointer;
    border: none; border-radius: 999px;
    background: #ff5c7a; color: #fff;
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    padding: 14px 42px;
    box-shadow: 0 8px 24px rgba(255,92,122,.4);
    transition: transform .08s;
  }
  .btn:active { transform: scale(.95); }
  #hint { position:absolute; bottom: 34px; left:0; right:0; text-align:center; color:#fff; opacity:.5; font-size:14px; pointer-events:none; }
  #mute {
    position: absolute; top: 22px; right: 18px; z-index: 5;
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.12); color: #fff;
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
  }
  #mute:active { transform: scale(.92); }
  #combo {
    position: absolute; top: 150px; left: 0; right: 0; z-index: 4;
    text-align: center; pointer-events: none;
    color: #ffd54a; font-weight: 800; font-size: 30px; letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .35s;
  }
  #combo.pop { animation: comboPop .35s ease-out; }
  @keyframes comboPop {
    0%   { transform: scale(.4); }
    60%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  #meter {
    position: absolute; top: 108px; left: 50%; transform: translateX(-50%);
    width: 150px; height: 9px; border-radius: 6px; z-index: 4;
    background: rgba(255,255,255,.15); overflow: hidden;
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #meter.show { opacity: 1; }
  #meterFill {
    height: 100%; width: 100%; transform-origin: left center;
    background: linear-gradient(90deg, #ffd54a, #ff7a59);
  }
  #meterLabel {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    color: #ffd54a; font-weight: 800; font-size: 15px; letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,.5); white-space: nowrap;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <button id="mute" aria-label="サウンド切替">🔊</button>
  <div id="combo"></div>
  <div id="meter"><div id="meterFill"></div><span id="meterLabel"></span></div>
  <div id="hud">
    <div id="score">0</div>
    <div id="best"></div>
  </div>
  <div id="hint">クリック / タップで重ねる</div>
  <div id="overlay">
    <div id="title">STACK</div>
    <div id="sub">流れるブロックを<br>下にぴったり重なる瞬間にタップ！</div>
    <div id="final"></div>
    <button class="btn" id="startBtn">スタート</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const finalEl = document.getElementById('final');
  const startBtn = document.getElementById('startBtn');
  const hint = document.getElementById('hint');
  const muteBtn = document.getElementById('mute');
  const comboEl = document.getElementById('combo');
  const meterEl = document.getElementById('meter');
  const meterFill = document.getElementById('meterFill');
  const meterLabel = document.getElementById('meterLabel');

  // ----- audio (WebAudio・音声ファイル不要) -----
  let audioCtx = null;
  let muted = localStorage.getItem('stack_muted') === '1';
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  // 1音を鳴らす汎用関数（エンベロープ付き）
  function tone({ freq = 440, type = 'sine', dur = 0.12, vol = 0.2, slideTo = null, delay = 0 }) {
    if (muted || !audioCtx) return;
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }
  function sndDrop() {
    tone({ freq: 200, type: 'square', dur: 0.09, vol: 0.16, slideTo: 120 });
  }
  function sndPerfect(combo) {
    // コンボが続くほど音程が半音ずつ上がる（上限あり）
    const step = Math.min(combo, 14);
    const base = 660 * Math.pow(2, step / 12);
    tone({ freq: base, type: 'triangle', dur: 0.14, vol: 0.22 });
    tone({ freq: base * 1.5, type: 'sine', dur: 0.16, vol: 0.11, delay: 0.02 }); // 5度上で華やかに
  }
  function sndGameOver() {
    tone({ freq: 320, type: 'sawtooth', dur: 0.5, vol: 0.2, slideTo: 90 });
  }
  function updateMuteUI() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
  updateMuteUI();
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    localStorage.setItem('stack_muted', muted ? '1' : '0');
    updateMuteUI();
    if (!muted) { ensureAudio(); sndDrop(); } // 解除時に確認音
  });

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ----- game state -----
  const BLOCK_H = 46;          // 各ブロックの高さ(px)
  const BASE_W = 220;          // 最初のブロックの幅
  const START_SPEED = 3.4;
  let blocks = [];             // 確定したブロック {x,w,colorIdx}
  let moving;                  // 動いているブロック
  let dir;                     // 移動方向
  let speed;
  let score;
  let camY = 0;                // カメラの縦オフセット(目標)
  let camYCur = 0;
  let running;
  let best = +(localStorage.getItem('stack_best') || 0);
  let bestHeight = +(localStorage.getItem('stack_best_h') || 0); // 自己ベストの段数
  let particles = [];
  let flash = 0;
  let combo = 0;               // パーフェクト連続数
  let gauge = 0;               // コンボ倍率ゲージ（残り秒）
  let shake = 0;               // 画面シェイク量
  let nowT = 0;                // 現在時刻(ms)・星の瞬き用
  const GAUGE_MAX = 3.2;       // ゲージ満タンの秒数

  bestEl.textContent = best ? 'BEST ' + best : '';

  function baseY() { return H - 120; } // 最下段ブロックの上端基準

  function colorFor(i) {
    // 虹色がゆっくり巡回
    const hue = (i * 8 + 200) % 360;
    return `hsl(${hue}, 65%, 58%)`;
  }

  // ----- 空（背景）：積むほど 夜→朝→昼→夕→夜→宇宙→オーロラ… と無限に巡る -----
  const SKY = [
    { top: [34, 42, 64],    bot: [17, 20, 31] },     // 夜
    { top: [86, 64, 120],   bot: [196, 96, 88] },    // 夜明け
    { top: [150, 200, 235], bot: [255, 226, 188] },  // 朝
    { top: [80, 160, 240],  bot: [205, 238, 255] },  // 昼（快晴）
    { top: [255, 160, 90],  bot: [255, 96, 120] },   // 夕焼け
    { top: [70, 48, 110],   bot: [150, 64, 120] },   // 夕暮れ
    { top: [10, 12, 28],    bot: [28, 20, 52] },     // 宇宙（深い夜）
    { top: [18, 70, 80],    bot: [44, 150, 120] },   // オーロラ
  ];
  const BIOME_BLOCKS = 12;     // 1つの景色あたりの段数
  function lerp(a, b, t) { return a + (b - a) * t; }
  function mixArr(c1, c2, t) {
    return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];
  }
  function rgb(a) { return `rgb(${a[0] | 0},${a[1] | 0},${a[2] | 0})`; }
  function skyAt(prog) {
    if (!isFinite(prog)) prog = 0;
    const n = SKY.length;
    const fp = ((prog % n) + n) % n;   // 0..n を循環
    const i = Math.floor(fp), lt = fp - i;
    const a = SKY[i], b = SKY[(i + 1) % n];
    return { top: mixArr(a.top, b.top, lt), bot: mixArr(a.bot, b.bot, lt) };
  }
  // 暗い空のときに浮かぶ星
  const stars = [];
  for (let i = 0; i < 46; i++) {
    stars.push({ x: Math.random(), y: Math.random() * 0.72, r: Math.random() * 1.4 + 0.4, ph: Math.random() * 6.28 });
  }
  function drawStars(dark) {
    ctx.fillStyle = '#fff';
    for (const s of stars) {
      const tw = 0.6 + 0.4 * Math.sin(nowT * 0.002 + s.ph);
      ctx.globalAlpha = dark * tw * 0.9;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ----- コンボ表示 -----
  function showCombo(n) {
    if (n < 2) return;            // 2連続以上で表示
    comboEl.textContent = 'COMBO ×' + n;
    comboEl.classList.remove('pop');
    void comboEl.offsetWidth;     // アニメ再生のためリフロー
    comboEl.classList.add('pop');
    comboEl.style.opacity = '1';
  }
  function hideCombo() { comboEl.style.opacity = '0'; }

  // ----- コンボ倍率メーター -----
  function updateMeter() {
    if (combo > 0) {
      meterEl.classList.add('show');
      meterFill.style.transform = 'scaleX(' + Math.max(0, gauge / GAUGE_MAX) + ')';
      meterLabel.textContent = '× ' + (1 + combo);
    } else {
      meterEl.classList.remove('show');
    }
  }

  function reset() {
    blocks = [];
    const x0 = (W - BASE_W) / 2;
    blocks.push({ x: x0, w: BASE_W, colorIdx: 0 });
    score = 0;
    speed = START_SPEED;
    camY = 0; camYCur = 0;
    particles = [];
    flash = 0;
    combo = 0;
    gauge = 0;
    shake = 0;
    hideCombo();
    updateMeter();
    spawnMoving();
    running = true;
    scoreEl.textContent = '0';
    overlay.classList.add('hide');
    hint.style.opacity = .5;
  }

  function spawnMoving() {
    const last = blocks[blocks.length - 1];
    dir = Math.random() < 0.5 ? 1 : -1;
    const startX = dir === 1 ? -last.w : W;
    moving = { x: startX, w: last.w, colorIdx: blocks.length };
  }

  function drop() {
    if (!running) return;
    const last = blocks[blocks.length - 1];
    const overlapL = Math.max(moving.x, last.x);
    const overlapR = Math.min(moving.x + moving.w, last.x + last.w);
    const overlap = overlapR - overlapL;

    if (overlap <= 0) {
      // 完全に外した → ゲームオーバー
      spawnFalling(moving.x, moving.w, moving.colorIdx, screenY(blocks.length));
      gameOver();
      return;
    }

    // ハミ出した部分を切り落とす
    const cut = moving.w - overlap;
    let perfect = false;
    if (Math.abs(cut) < 4) {
      // ほぼぴったり → パーフェクト（幅を少し回復＆ボーナス）
      perfect = true;
      moving.x = last.x;
      moving.w = last.w;
      flash = 1;
      combo++;
      gauge = GAUGE_MAX;                          // ゲージ満タン
      shake = Math.min(3 + combo * 1.4, 16);      // コンボが伸びるほど派手に揺れる
      spawnPerfect(overlapL, screenY(blocks.length), overlap, combo);
      sndPerfect(combo - 1);
      showCombo(combo);
    } else {
      // 落ちていく切れ端の破片を飛ばす
      if (moving.x < last.x) {
        spawnFalling(moving.x, cut, moving.colorIdx, screenY(blocks.length), -1);
      } else {
        spawnFalling(overlapR, cut, moving.colorIdx, screenY(blocks.length), 1);
      }
      moving.x = overlapL;
      moving.w = overlap;
      combo = 0;
      gauge = 0;
      sndDrop();
      hideCombo();
    }

    blocks.push({ x: moving.x, w: moving.w, colorIdx: moving.colorIdx });
    score += 1 + combo;          // スコア = 基本点 × 倍率(1+コンボ)
    scoreEl.textContent = score;
    updateMeter();
    hint.style.opacity = 0;

    // カメラを1段分上へ
    camY += BLOCK_H;
    // 少しずつ加速（高さ基準）
    speed = START_SPEED + (blocks.length - 1) * 0.09;

    spawnMoving();
  }

  // 確定済みブロックの画面Y（上端）。index番目の段。
  function screenY(index) {
    return baseY() - index * BLOCK_H + camYCur;
  }

  function spawnPerfect(x, y, w, combo) {
    const count = Math.min(14 + combo * 4, 60); // コンボが伸びるほど派手に
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + Math.random() * w, y: y + BLOCK_H / 2,
        vx: (Math.random() - .5) * 4, vy: -Math.random() * 4 - 1,
        life: 1, type: 'spark'
      });
    }
  }

  function spawnFalling(x, w, colorIdx, y, side) {
    particles.push({
      x, y, w, colorIdx, vy: 0, vx: (side || 0) * 1.2,
      rot: 0, vr: (side || (Math.random() - .5)) * 0.06,
      life: 1, type: 'chunk'
    });
  }

  function gameOver() {
    running = false;
    sndGameOver();
    hideCombo();
    if (score > best) {
      best = score;
      localStorage.setItem('stack_best', best);
    }
    const h = blocks.length - 1;          // 今回の到達段数
    if (h > bestHeight) {
      bestHeight = h;
      localStorage.setItem('stack_best_h', bestHeight);
    }
    bestEl.textContent = best ? 'BEST ' + best : '';
    finalEl.innerHTML = `SCORE <b>${score}</b>　/　BEST <b>${best}</b>`;
    startBtn.textContent = 'もう一回';
    setTimeout(() => overlay.classList.remove('hide'), 550);
  }

  // ----- loop -----
  function update(f) {
    // カメラ補間（フレームレート非依存）
    camYCur += (camY - camYCur) * Math.min(1, 0.12 * f);

    if (running) {
      moving.x += dir * speed * f;
      const last = blocks[blocks.length - 1];
      // 端で反射（少しはみ出してから折り返す）
      if (dir === 1 && moving.x + moving.w > W + moving.w * 0.15) dir = -1;
      if (dir === -1 && moving.x < -moving.w * 0.15) dir = 1;
    }

    // パーティクル
    for (const p of particles) {
      if (p.type === 'chunk') {
        p.vy += 0.6 * f; p.y += p.vy * f; p.x += p.vx * f; p.rot += p.vr * f;
        p.life -= 0.012 * f;
      } else {
        p.vy += 0.15 * f; p.x += p.vx * f; p.y += p.vy * f; p.life -= 0.03 * f;
      }
    }
    particles = particles.filter(p => p.life > 0 && p.y < H + 200);

    // コンボ倍率ゲージは時間で減る。空になったらコンボ途切れ
    if (combo > 0) {
      gauge -= f / 60;
      if (gauge <= 0) { combo = 0; gauge = 0; hideCombo(); }
      updateMeter();
    }
    // 画面シェイク減衰
    if (shake > 0.2) shake *= Math.pow(0.86, f); else shake = 0;

    if (flash > 0) flash -= 0.05 * f;
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, h / 2, w / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBlock(x, y, w, colorIdx) {
    const col = colorFor(colorIdx);
    roundRect(x, y, w, BLOCK_H - 4, 6);
    ctx.fillStyle = col;
    ctx.fill();
    // 上面ハイライト
    ctx.fillStyle = 'rgba(255,255,255,.14)';
    roundRect(x, y, w, (BLOCK_H - 4) * 0.4, 6);
    ctx.fill();
  }

  function render() {
    ctx.save();
    // コンボが伸びるほど画面が揺れる
    if (shake > 0) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);

    // 背景：積むほど景色が無限に巡る
    const prog = camYCur / (BLOCK_H * BIOME_BLOCKS);
    const sky = skyAt(prog);
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, rgb(sky.top));
    bg.addColorStop(1, rgb(sky.bot));
    ctx.fillStyle = bg;
    ctx.fillRect(-30, -30, W + 60, H + 60);   // シェイクで端が欠けないよう余白込み

    // 暗い空では星が瞬く
    const brightness = (sky.top[0] + sky.top[1] + sky.top[2]) / 3;
    const dark = Math.max(0, 1 - brightness / 110);
    if (dark > 0.04) drawStars(dark);

    // パーフェクト時の白フラッシュ
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash * 0.18})`;
      ctx.fillRect(-30, -30, W + 60, H + 60);
    }

    // 自己ベストの到達ライン（超えろ！）
    if (bestHeight > 0) {
      const ly = screenY(bestHeight);
      if (ly > -20 && ly < H + 20) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,.55)';
        ctx.setLineDash([8, 8]);
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,.8)';
        ctx.font = '700 13px sans-serif';
        ctx.textBaseline = 'bottom';
        ctx.fillText('BEST ' + bestHeight, 12, ly - 5);
        ctx.restore();
      }
    }

    // 確定ブロック
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      const y = screenY(i);
      if (y > H + BLOCK_H || y < -BLOCK_H * 2) continue;
      drawBlock(b.x, y, b.w, b.colorIdx);
    }

    // 動いているブロック
    if (running) {
      const y = screenY(blocks.length);
      drawBlock(moving.x, y, moving.w, moving.colorIdx);
    }

    // パーティクル
    for (const p of particles) {
      if (p.type === 'chunk') {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.translate(p.x + p.w / 2, p.y + BLOCK_H / 2);
        ctx.rotate(p.rot);
        roundRect(-p.w / 2, -(BLOCK_H - 4) / 2, p.w, BLOCK_H - 4, 6);
        ctx.fillStyle = colorFor(p.colorIdx);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = '#fff';
        ctx.fillRect(p.x, p.y, 4, 4);
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  let lastT = 0;
  function frame(t) {
    nowT = t;
    if (!lastT) lastT = t;
    let f = (t - lastT) / (1000 / 60);   // 60fps基準の経過フレーム数
    lastT = t;
    if (!isFinite(f) || f <= 0) f = 1;
    if (f > 4) f = 4;                     // タブ復帰などの大ジャンプを抑制
    update(f);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ----- input -----
  function onTap(e) {
    if (e) e.preventDefault();
    ensureAudio();
    if (!running) return;
    drop();
  }
  canvas.addEventListener('pointerdown', onTap);
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); ensureAudio(); running ? drop() : reset(); }
  });
  startBtn.addEventListener('click', (e) => { e.stopPropagation(); ensureAudio(); reset(); });
})();
